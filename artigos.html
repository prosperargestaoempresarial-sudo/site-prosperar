<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosperar BPO - Hub de Inteligência</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0B141D; margin: 0; font-family: 'Montserrat', sans-serif; color: #EDE6D8; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        
        main { max-width: 800px; margin: 0 auto; padding: 120px 20px; background: #0B141D; }
        
        header { margin-bottom: 50px; }
        
        .conteudo-texto { line-height: 1.8; font-size: 1.1rem; opacity: 0.9; }
        .conteudo-texto img { max-width: 100%; border-radius: 4px; margin: 20px 0; border: 1px solid rgba(212, 183, 122, 0.2); }
        .conteudo-texto h3 { color: #D4B77A; margin-top: 30px; }
        
        .card-lista { 
            margin-bottom: 30px; 
            border: 1px solid rgba(212, 183, 122, 0.1); 
            padding: 25px; 
            border-radius: 4px; 
            transition: 0.3s;
            background: rgba(212, 183, 122, 0.02);
        }
        .card-lista:hover { border-color: #D4B77A; background: rgba(212, 183, 122, 0.05); }

        /* Paginação Premium */
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 50px; }
        .btn-paginacao { 
            background: transparent; 
            border: 1px solid rgba(212, 183, 122, 0.2); 
            color: #EDE6D8; 
            min-width: 40px;
            height: 40px;
            cursor: pointer; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.8rem; 
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-paginacao:hover:not(.active):not(:disabled) { border-color: #D4B77A; background: rgba(212, 183, 122, 0.1); }
        .btn-paginacao.active { background: #D4B77A; color: #0B141D; border-color: #D4B77A; }
        .btn-paginacao:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-nav { padding: 0 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<main>
    <header>
        <span id="post-meta" style="color: #D4B77A; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">
            Carregando...
        </span>
        <h1 id="post-titulo" style="font-family: 'Montserrat', sans-serif; font-size: 3rem; margin: 20px 0; line-height: 1.2; color: #EDE6D8;">
            ...
        </h1>
        <p id="post-autor" style="opacity: 0.6; font-size: 1.2rem; font-style: italic; color: #EDE6D8;">
            Deividi Zimmer - Economista Reg. 3249
        </p>
    </header>

    <div id="post-conteudo" class="conteudo-texto">
        <p style="color: #D4B77A;">Conectando ao banco de dados...</p>
    </div>

    <div id="paginacao" class="pagination-container" style="display: none;">
        </div>

    <div style="margin-top: 60px; border-top: 1px solid rgba(212, 183, 122, 0.2); padding-top: 30px;">
        <a href="index.html#artigos" style="color: #D4B77A; text-decoration: none; font-weight: bold; transition: 0.3s;">
            ← Voltar para o Site
        </a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://akgdoohrwjiuxxjavepq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_pi1ZCVTHl-hU8vlpGNF9lg_FqLcPJzs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let paginaAtual = 1;
    const ITENS_POR_PAGINA = 5;

    async function carregarPagina() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('p');

        if (!slug) {
            const { data: posts, error, count } = await supabaseClient
                .from('posts')
                .select('*', { count: 'exact' })
                .order('created_at', { ascending: false })
                .range((paginaAtual - 1) * ITENS_POR_PAGINA, (paginaAtual * ITENS_POR_PAGINA) - 1);

            if (error) return;

            document.getElementById('post-titulo').innerText = "Hub de Inteligência";
            document.getElementById('post-meta').innerText = "Conteúdo Estratégico";
            document.getElementById('post-autor').style.display = 'none';

            if (posts && posts.length > 0) {
                let listaHtml = '';
                posts.forEach(post => {
                    listaHtml += `
                        <div class="card-lista">
                            <span style="color: #D4B77A; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">${post.categoria || 'FINANÇAS'}</span>
                            <h3 style="margin: 10px 0;"><a href="artigos.html?p=${post.slug}" style="color: #EDE6D8; text-decoration: none;">${post.titulo}</a></h3>
                            <p style="color: #EDE6D8; opacity: 0.6; font-size: 0.95rem; line-height: 1.6;">${post.resumo || ''}</p>
                            <a href="artigos.html?p=${post.slug}" style="color: #D4B77A; text-decoration: none; font-size: 0.8rem; font-weight: bold;">LER ARTIGO +</a>
                        </div>`;
                });
                document.getElementById('post-conteudo').innerHTML = listaHtml;
                
                renderizarControlesPaginacao(count);
                window.scrollTo(0, 0);
            }
            return;
        }

        // MODO ARTIGO ÚNICO
        const { data: post } = await supabaseClient.from('posts').select('*').eq('slug', slug).single();
        if (post) {
            document.title = `${post.titulo} | Prosperar BPO`;
            document.getElementById('post-titulo').innerText = post.titulo;
            document.getElementById('post-meta').innerText = `${post.categoria || 'Artigo'} • ${new Date(post.created_at).toLocaleDateString('pt-BR')}`;
            document.getElementById('post-conteudo').innerHTML = post.conteudo;
            document.getElementById('paginacao').style.display = 'none';
        }
    }

    function renderizarControlesPaginacao(totalItens) {
        const totalPaginas = Math.ceil(totalItens / ITENS_POR_PAGINA);
        if (totalPaginas <= 1) return;

        const container = document.getElementById('paginacao');
        container.style.display = 'flex';
        container.innerHTML = '';

        // Botão Anterior
        const btnAnt = document.createElement('button');
        btnAnt.className = 'btn-paginacao btn-nav';
        btnAnt.innerText = '←';
        btnAnt.disabled = paginaAtual === 1;
        btnAnt.onclick = () => { paginaAtual--; carregarPagina(); };
        container.appendChild(btnAnt);

        // Números das Páginas
        for (let i = 1; i <= totalPaginas; i++) {
            const btn = document.createElement('button');
            btn.className = `btn-paginacao ${i === paginaAtual ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => { paginaAtual = i; carregarPagina(); };
            container.appendChild(btn);
        }

        // Botão Próximo
        const btnProx = document.createElement('button');
        btnProx.className = 'btn-paginacao btn-nav';
        btnProx.innerText = '→';
        btnProx.disabled = paginaAtual === totalPaginas;
        btnProx.onclick = () => { paginaAtual++; carregarPagina(); };
        container.appendChild(btnProx);
    }

    carregarPagina();
</script>

</body>
</html>
